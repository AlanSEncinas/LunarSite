# Stage 2: Enhanced Terrain Hazard Segmentation
# DINOv2 encoder + lunar-specific augmentations + LuSNAR data

data:
  primary_dataset: "romainpessia/artificial-lunar-rocky-landscape-dataset"
  supplementary_dataset: "JeremyLuo/LuSNAR"
  input_size: 480
  num_classes: 4
  class_names: ["background", "small_rocks", "large_rocks", "sky"]
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  seed: 42

model:
  architecture: "DINOv2UNet"
  encoder: "dinov2_vitb14"
  frozen_encoder: false
  classes: 4
  mc_dropout_p: 0.1

training:
  epochs: 50
  batch_size: 8
  learning_rate: 5.0e-5
  optimizer: "adamw"
  weight_decay: 1.0e-2
  scheduler: "cosine"
  scheduler_params:
    T_max: 50
    eta_min: 1.0e-7

loss:
  type: "dice_ce"
  dice_weight: 0.5
  ce_weight: 0.5

augmentation:
  # Standard spatial
  horizontal_flip: true
  vertical_flip: true
  random_rotate_90: true
  # Lunar-specific
  lunar_shadow_rotation: true
  shadow_angle_range: [-45, 45]
  extreme_contrast: true
  hapke_brdf_perturbation: true
  synthetic_crater_overlay: true
  gaussian_noise: true

output:
  checkpoint_dir: "models/"
  log_dir: "outputs/logs/"
  save_best: true
  metric: "mean_iou"
