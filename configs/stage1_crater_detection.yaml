# Stage 1: Crater Detection
# Dataset: DeepMoon (Silburt 2019, Zenodo 1133969) - synthetic LOLA-derived DEM
# tiles with crater ring masks. Binary U-Net segmentation.
# Validation plan: PGDA LOLA south pole DEM + Robbins 2019 catalog projection.

data:
  source: "deepmoon"
  zenodo_record: "1133969"
  train_hdf5: "train_images.hdf5"
  dev_hdf5: "dev_images.hdf5"
  test_hdf5: "test_images.hdf5"
  train_craters_hdf5: "train_craters.hdf5"
  dev_craters_hdf5: "dev_craters.hdf5"
  test_craters_hdf5: "test_craters.hdf5"
  input_size: 256
  num_classes: 1
  binary_threshold: 0.0
  seed: 42

model:
  architecture: "Unet"
  encoder: "resnet34"
  encoder_weights: "imagenet"
  in_channels: 1
  classes: 1

training:
  epochs: 40
  batch_size: 16
  learning_rate: 1.0e-4
  optimizer: "adam"
  weight_decay: 1.0e-4
  scheduler: "cosine"
  scheduler_params:
    T_max: 40
    eta_min: 1.0e-6

loss:
  type: "dice_bce"
  dice_weight: 0.5
  bce_weight: 0.5

output:
  checkpoint_dir: "models/"
  log_dir: "outputs/logs/"
  save_best: true
  metric: "iou"
